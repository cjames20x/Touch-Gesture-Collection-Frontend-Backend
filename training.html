<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Training</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body class="training-page">
    <div class="page">
      <div class="card">
        <div class="nav-bar">
          <button id="back-button" class="btn-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px">
              <path d="M15 18l-6-6 6-6"/>
            </svg>
            Back
          </button>
          <div id="user-info">Loading...</div>
        </div>

        <div class="training-status-top">
          <p id="training-status">Rep 1 / 10</p>
        </div>

        <div class="training-panel">
          <div id="surface"></div>
        </div>

        <div class="training-footer">
          <div class="training-status-stack">
            <p id="current-instruction">Step 1 / 3</p>
          </div>

          <div class="training-controls">
            <button id="start-training" class="btn-primary">Start Training</button>
            <button id="stop-training" class="btn-secondary" style="display:none">Stop</button>
          </div>
        </div>

        <a id="continue-btn" class="btn-primary" href="selection.html">
          Back to Session
        </a>
      </div>
    </div>

    <script type="module" src="dist/training.js"></script>
  </body>
</html>
