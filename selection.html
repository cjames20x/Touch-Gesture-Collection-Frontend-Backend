<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Selection</title>
    <link rel="stylesheet" href="index.css" />
    <script type="module" src="dist/selection.js"></script>
  </head>
  <body>
    <div class="page">
      <div class="card">

        <div class="nav-bar">
          <a class="btn-back" href="index.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 18l-6-6 6-6"/>
            </svg>
            Back
          </a>
        </div>

        <div class="app-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 1 1 0 10A5 5 0 0 1 12 2zm0 12c5.33 0 8 2.67 8 4v2H4v-2c0-1.33 2.67-4 8-4z"/></svg>
        </div>

        <div>
          <h1 class="page-title">Session</h1>
          <p class="page-subtitle" style="margin-top:4px">Select your session. First complete Training (10 reps), then Authentication (1 rep).</p>
        </div>

        <div id="user-info">Loading...</div>

        <div class="session-grid" id="session-grid">
          <label class="session-card" id="sess1">
            <input type="radio" name="session" value="1" />
            <div class="session-num">1</div>
            <div class="session-label">
              <span class="session-title">TRAINING</span>
              <span class="session-reps" style="font-size: 0.7rem; color: #94a3b8; margin-top: 2px;">10 reps</span>
            </div>
          </label>
          <label class="session-card" id="sess3">
            <input type="radio" name="session" value="3" />
            <div class="session-num">2</div>
            <div class="session-label">
              <span class="session-title">AUTHENTICATION</span>
              <span class="session-reps" style="font-size: 0.7rem; color: #94a3b8; margin-top: 2px;">1 rep</span>
            </div>
          </label>
        </div>

        <div class="divider"></div>

        <div class="row" style="display:flex;gap:10px">
          <button id="to-eval" class="btn-primary" style="flex:1">Next →</button>
        </div>

        <a class="link" href="user.html" target="_blank">View saved user info</a>

      </div>
    </div>

    <script>
      document.querySelectorAll('.session-card').forEach(card => {
        card.addEventListener('click', function() {
          document.querySelectorAll('.session-card').forEach(c => c.classList.remove('selected'));
          this.classList.add('selected');
          this.querySelector('input').checked = true;
        });
      });

      document.getElementById('to-eval').addEventListener('click', function() {
        const selected = document.querySelector('input[name="session"]:checked');
        if (selected) {
          const sessionMap = { '1': 'training', '2': 'evaluation', '3': 'authentication' };
          const mode = sessionMap[selected.value];
          window.location.href = `eval.html?mode=${mode}`;
        }
      });
    </script>
  </body>
</html>
