<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Biometric Authentication</title>
    <link rel="stylesheet" href="index.css" />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 0; }

      #api-popup {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        min-width: 260px;
        max-width: 90vw;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 0.82rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.13);
        transition: opacity 0.3s ease, transform 0.3s ease;
        background: #f9fafb;
        border: 1.5px solid #e5e7eb;
        color: #374151;
      }
      #api-popup.connected {
        background: #dcfce7;
        border-color: #86efac;
        color: #15803d;
      }
      #api-popup.offline {
        background: #fef2f2;
        border-color: #fca5a5;
        color: #b91c1c;
      }
      #api-popup.hidden {
        opacity: 0;
        transform: translateX(-50%) translateY(-12px);
        pointer-events: none;
      }
      #api-popup-close {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        line-height: 1;
        color: inherit;
        opacity: 0.6;
        padding: 0 2px;
        flex-shrink: 0;
      }
      #api-popup-close:hover { opacity: 1; }

      html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      .page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      }

      .page-card {
        width: 100%;
        max-width: 380px;
        background: white;
        border-radius: 20px;
        padding: 24px 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-height: calc(100vh - 40px);
        overflow-y: auto;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .session-badge {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 6px 12px;
        border-radius: 8px;
        background: #e0e7ff;
        color: #3730a3;
        flex-shrink: 0;
      }

      .user-info {
        font-size: 0.75rem;
        font-weight: 600;
        color: #475569;
        text-align: right;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
        min-width: 0;
      }

      .gesture-area-container {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      #surface {
        width: 100%;
        height: 220px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 3px dashed #cbd5e1;
        border-radius: 16px;
        background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(248,250,252,0.9) 100%);
        color: #64748b;
        font-size: 4rem;
        font-weight: 300;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
        cursor: crosshair;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      #surface:active {
        background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(240,245,250,0.95) 100%);
        border-color: #60a5fa;
      }

      #surface.recording {
        border-color: #ef4444;
        background: linear-gradient(135deg, rgba(255,245,245,0.95) 0%, rgba(255,240,240,0.95) 100%);
        color: #ef4444;
      }

      #surface.success {
        border-color: #22c55e;
        background: linear-gradient(135deg, rgba(240,253,244,0.95) 0%, rgba(245,255,250,0.95) 100%);
        color: #22c55e;
      }

      .instruction-panel {
        text-align: center;
        padding: 10px 12px;
        background: rgba(255,255,255,0.8);
        border-radius: 12px;
        border: 1px solid rgba(203,213,225,0.5);
      }

      .instruction-label {
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #94a3b8;
        margin-bottom: 2px;
      }

      .instruction-text {
        font-size: 1.3rem;
        font-weight: 700;
        color: #1e293b;
        line-height: 1.2;
      }

      .sequence-display {
        font-size: 0.7rem;
        font-weight: 500;
        color: #64748b;
        margin-top: 4px;
        letter-spacing: 0.02em;
      }

      .progress-bar {
        height: 3px;
        background: #e2e8f0;
        border-radius: 2px;
        overflow: hidden;
        margin-top: 4px;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #3b82f6, #60a5fa);
        width: 0%;
        transition: width 0.3s ease;
      }

      .control-panel {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .btn-primary, .btn-secondary, .btn-approve, .btn-reject {
        padding: 10px 16px;
        border: none;
        border-radius: 12px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        text-align: center;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        white-space: nowrap;
        height: 40px;
      }

      .btn-primary {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        box-shadow: 0 4px 12px rgba(59,130,246,0.3);
      }

      #start-btn, #stop-btn {
        grid-column: 1 / -1;
        width: 280px;
        margin: 0 auto;
      }

      .btn-primary:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(59,130,246,0.4);
      }

      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-secondary {
        background: #f1f5f9;
        color: #475569;
        border: 1.5px solid #cbd5e1;
      }

      .btn-secondary:hover:not(:disabled) {
        background: #e2e8f0;
        border-color: #94a3b8;
      }

      .btn-secondary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-approve {
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: white;
        box-shadow: 0 4px 12px rgba(34,197,94,0.3);
      }

      .btn-approve:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(34,197,94,0.4);
      }

      .btn-reject {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white;
        box-shadow: 0 4px 12px rgba(239,68,68,0.3);
      }

      .btn-reject:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(239,68,68,0.4);
      }

      #output {
        max-height: 120px;
        min-height: 60px;
        overflow-y: auto;
        padding: 12px;
        background: #f8f9fa;
        border-radius: 12px;
        font-size: 0.75rem;
        line-height: 1.5;
        border: 1px solid #e2e8f0;
        font-family: 'SF Mono', 'Monaco', monospace;
      }

      .output-line {
        padding: 2px 0;
        display: flex;
        gap: 8px;
      }

      .output-line.success { color: #22c55e; font-weight: 600; }
      .output-line.error { color: #ef4444; font-weight: 600; }
      .output-line.warning { color: #f59e0b; font-weight: 600; }
      .output-line.info { color: #3b82f6; }

      #next-section {
        margin-top: 8px;
      }

      #next-btn {
        width: 100%;
        padding: 12px 16px !important;
        height: 48px !important;
        grid-column: unset !important;
      }

      @media (max-width: 480px) {
        .page {
          padding: 16px;
        }

        .page-card {
          padding: 24px 20px;
          border-radius: 16px;
          max-height: calc(100vh - 32px);
        }

        #surface {
          height: 220px;
          font-size: 3rem;
        }

        .instruction-text {
          font-size: 1.1rem;
        }

        .control-panel {
          grid-template-columns: 1fr;
        }

        .btn-primary, .btn-secondary, .btn-approve, .btn-reject {
          grid-column: span 1 !important;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>

    <div id="api-popup">
      <span id="api-popup-msg">⏳ Checking API connection...</span>
      <button id="api-popup-close" title="Dismiss">✕</button>
    </div>

    <div class="page">
      <div class="page-card">
        <div class="header">
          <span class="session-badge" id="session-badge">Training</span>
          <span class="user-info" id="user-info">Loading user...</span>
        </div>

        <div class="gesture-area-container">
          <div class="instruction-panel">
            <div class="instruction-label" id="instruction-label">GESTURE 1/3</div>
            <div class="instruction-text" id="instruction-text">TAP (1/10)</div>
            <div class="sequence-display" id="sequence-display">Tap → Scroll → Swipe</div>
            <div class="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
          </div>

          <div id="surface">👆</div>
        </div>

        <div id="output" style="display: none;"></div>

        <div class="control-panel" id="control-panel">
          <button id="start-btn" class="btn-primary">▶ Start</button>
          <button id="stop-btn" class="btn-secondary" style="display: none;">■ Stop</button>
          <button id="approve-btn" class="btn-approve" style="display: none;">✓ Approve</button>
          <button id="reject-btn" class="btn-reject" style="display: none;">✗ Reject</button>
        </div>

        <div id="next-section" style="display: none;">
          <a id="next-btn" class="btn-primary" href="selection.html" style="text-decoration: none;">→ Continue</a>
        </div>
      </div>
    </div>

    <script>
      document.getElementById('api-popup-close').addEventListener('click', () => {
        document.getElementById('api-popup').classList.add('hidden');
      });

      // Set badge title from URL mode param
      const mode = new URLSearchParams(window.location.search).get('mode') || 'training';
      const titles = { training: 'TRAINING', evaluation: 'EVALUATION', authentication: 'AUTHENTICATION' };
      document.getElementById('session-badge').textContent = titles[mode] || mode.toUpperCase();
    </script>

    <script type="module" src="dist/eval.js"></script>
  </body>
</html>
